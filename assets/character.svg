<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#37936F" stop-opacity=".55"/>
      <stop offset="55%" stop-color="#123227" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#070808" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252A27"/>
      <stop offset="100%" stop-color="#141716"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0D0C"/>
      <stop offset="100%" stop-color="#123227"/>
    </linearGradient>
    <linearGradient id="acid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B9FF47"/>
      <stop offset="100%" stop-color="#D4FF7A"/>
    </linearGradient>
  </defs>

  <!-- ambient glow -->
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- orbit rings -->
  <g fill="none" stroke="#B9FF47" stroke-opacity=".18" stroke-width="2">
    <circle cx="300" cy="330" r="230"/>
    <circle cx="300" cy="330" r="185" stroke-dasharray="6 14"/>
  </g>
  <circle cx="510" cy="205" r="7" fill="#B9FF47" opacity=".8"/>
  <circle cx="96" cy="430" r="5" fill="#37936F"/>
  <circle cx="472" cy="500" r="4" fill="#FFD34D" opacity=".85"/>

  <!-- antenna -->
  <line x1="300" y1="118" x2="300" y2="170" stroke="#5D655F" stroke-width="10" stroke-linecap="round"/>
  <circle cx="300" cy="106" r="16" fill="url(#acid)"/>
  <circle cx="300" cy="106" r="26" fill="none" stroke="#B9FF47" stroke-opacity=".35" stroke-width="3"/>

  <!-- head -->
  <rect x="160" y="168" width="280" height="230" rx="86" fill="url(#body)" stroke="#5D655F" stroke-width="4"/>
  <!-- visor -->
  <rect x="196" y="212" width="208" height="132" rx="60" fill="url(#visor)" stroke="#37936F" stroke-width="3"/>
  <!-- eyes -->
  <g fill="url(#acid)">
    <rect x="242" y="256" width="34" height="46" rx="17">
      <animate attributeName="height" values="46;46;6;46;46" keyTimes="0;.92;.95;.98;1" dur="4.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="256;256;276;256;256" keyTimes="0;.92;.95;.98;1" dur="4.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="324" y="256" width="34" height="46" rx="17">
      <animate attributeName="height" values="46;46;6;46;46" keyTimes="0;.92;.95;.98;1" dur="4.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="256;256;276;256;256" keyTimes="0;.92;.95;.98;1" dur="4.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- visor highlight -->
  <path d="M216 238c10-14 28-22 46-22" fill="none" stroke="#F4F6F2" stroke-opacity=".25" stroke-width="8" stroke-linecap="round"/>

  <!-- ears -->
  <rect x="128" y="248" width="34" height="70" rx="16" fill="#1C201E" stroke="#5D655F" stroke-width="3"/>
  <rect x="438" y="248" width="34" height="70" rx="16" fill="#1C201E" stroke="#5D655F" stroke-width="3"/>

  <!-- torso -->
  <path d="M188 430 h224 a44 44 0 0 1 44 44 v170 a60 60 0 0 1 -60 60 h-192 a60 60 0 0 1 -60 -60 v-170 a44 44 0 0 1 44 -44z" fill="url(#body)" stroke="#5D655F" stroke-width="4"/>
  <!-- neck -->
  <rect x="266" y="396" width="68" height="44" rx="14" fill="#1C201E"/>

  <!-- chest screen with code -->
  <rect x="212" y="470" width="176" height="120" rx="20" fill="#0B0D0C" stroke="#37936F" stroke-width="3"/>
  <g stroke-linecap="round" stroke-width="10">
    <line x1="236" y1="500" x2="316" y2="500" stroke="#B9FF47"/>
    <line x1="236" y1="528" x2="356" y2="528" stroke="#37936F"/>
    <line x1="252" y1="556" x2="330" y2="556" stroke="#5D655F"/>
  </g>
  <!-- badge -->
  <circle cx="358" cy="640" r="18" fill="none" stroke="url(#acid)" stroke-width="4"/>
  <path d="M350 640l6 6 12 -12" fill="none" stroke="url(#acid)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arms -->
  <rect x="98" y="470" width="48" height="150" rx="24" fill="#1C201E" stroke="#5D655F" stroke-width="3"/>
  <rect x="454" y="470" width="48" height="150" rx="24" fill="#1C201E" stroke="#5D655F" stroke-width="3"/>
  <circle cx="122" cy="632" r="26" fill="url(#body)" stroke="#5D655F" stroke-width="3"/>
  <circle cx="478" cy="632" r="26" fill="url(#body)" stroke="#5D655F" stroke-width="3"/>
</svg>
