<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMIL — Тренажёр</title>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
:root{
  --bg-0:#070808; --bg-1:#0E100F;
  --surface-1:#141716; --surface-2:#1C201E; --surface-3:#252A27;
  --text-1:#F4F6F2; --text-2:#9BA39D; --text-3:#5D655F; --text-on-acid:#0A0C08;
  --acid:#B9FF47; --acid-strong:#D4FF7A; --acid-dim:rgba(185,255,71,.14);
  --emerald:#37936F; --emerald-deep:#123227; --emerald-tint:rgba(55,147,111,.16);
  --ok:#B9FF47; --ok-tint:rgba(185,255,71,.12);
  --bad:#FF5A5A; --bad-tint:rgba(255,90,90,.12);
  --fire:#FF7A2F; --fire-tint:rgba(255,122,47,.14);
  --gold:#FFD34D; --gold-tint:rgba(255,211,77,.13);
  --hairline:rgba(255,255,255,.08); --hairline-strong:rgba(255,255,255,.16);
  --code-bg:#0B0D0C; --code-ink:#D9E2DA;
  --font-display:'Unbounded',system-ui,sans-serif;
  --font-body:'Manrope',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',Consolas,monospace;
  --fs-hero:44px; --fs-h1:30px; --fs-h2:22px; --fs-body:15.5px; --fs-small:13.5px; --fs-micro:11.5px; --fs-counter:38px;
  --ls-micro:.14em;
  --r-s:12px; --r-m:18px; --r-l:26px; --r-xl:36px; --r-pill:999px;
  --shadow-card:0 1px 0 rgba(255,255,255,.04) inset, 0 12px 32px rgba(0,0,0,.45);
  --glow-acid:0 0 20px rgba(185,255,71,.35),0 0 60px rgba(185,255,71,.12);
  --glow-fire:0 0 20px rgba(255,122,47,.4),0 0 56px rgba(255,122,47,.14);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;font-family:var(--font-body);font-size:var(--fs-body);line-height:1.6;color:var(--text-1);
  background-color:var(--bg-0);
  background-image:url("assets/noise.png"),
    radial-gradient(900px 600px at 12% -8%, rgba(55,147,111,.28), transparent 60%),
    radial-gradient(700px 500px at 96% 12%, rgba(185,255,71,.10), transparent 55%),
    radial-gradient(1000px 700px at 50% 115%, rgba(18,50,39,.9), transparent 60%);
  background-repeat:repeat,no-repeat,no-repeat,no-repeat;
  background-size:160px 160px,auto,auto,auto;
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:980px;margin:0 auto;padding:28px 20px 90px;display:flex;flex-direction:column;gap:20px}
.mono{font-family:var(--font-mono);font-size:var(--fs-micro);font-weight:600;letter-spacing:var(--ls-micro);text-transform:uppercase;color:var(--text-3)}
h1.disp{font-family:var(--font-display);font-weight:800;font-size:var(--fs-h1);line-height:1.12;margin:0;letter-spacing:-.01em}
/* header */
header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{font-family:var(--font-display);font-weight:800;font-size:24px}
.brand i{color:var(--acid)}
.xpbox{display:flex;align-items:center;gap:12px}
.xpbar{width:140px;height:8px;border-radius:var(--r-pill);background:var(--surface-2);border:1px solid var(--hairline);overflow:visible}
.xpbar>div{height:100%;border-radius:var(--r-pill);background:var(--acid);box-shadow:var(--glow-acid);transition:width .4s var(--ease)}
/* nav */
.navtabs{display:flex;gap:6px;padding:6px;background:var(--surface-1);border:1px solid var(--hairline);border-radius:var(--r-pill);width:fit-content;max-width:100%;overflow-x:auto;position:sticky;top:10px;z-index:9;box-shadow:var(--shadow-card)}
.navtabs button{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:var(--r-pill);border:none;cursor:pointer;font-family:var(--font-body);font-weight:800;font-size:14px;background:transparent;color:var(--text-2);transition:all .14s var(--ease);white-space:nowrap}
.navtabs button:hover{background:var(--surface-3);color:var(--text-1)}
.navtabs button.active{background:var(--acid);color:var(--text-on-acid)}
/* widget card */
.widget{background:var(--surface-1);border:1px solid var(--hairline);border-radius:var(--r-l);box-shadow:var(--shadow-card);padding:24px;display:flex;flex-direction:column;gap:16px}
.wlabel{display:flex;align-items:center;gap:8px}
.wlabel i{font-size:16px;color:var(--text-3)}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:9px;padding:12px 22px;border-radius:var(--r-pill);border:1px solid transparent;font-family:var(--font-body);font-weight:800;font-size:15px;white-space:nowrap;cursor:pointer;background:var(--acid);color:var(--text-on-acid);transition:all .14s var(--ease)}
.btn:hover{background:var(--acid-strong);box-shadow:var(--glow-acid)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:default;box-shadow:none}
.btn.secondary{background:var(--surface-2);color:var(--text-1);border:1px solid var(--hairline)}
.btn.secondary:hover{background:var(--surface-3);box-shadow:none}
.btn.sm{padding:8px 16px;font-size:13.5px}
/* pills */
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-pill);background:var(--surface-2);color:var(--text-2);border:1px solid var(--hairline);font-family:var(--font-mono);font-size:var(--fs-micro);font-weight:600;letter-spacing:var(--ls-micro);text-transform:uppercase;white-space:nowrap}
.pill i{font-size:13px}
.pill.ok{background:var(--ok-tint);color:var(--ok);border-color:transparent}
.pill.acid{background:var(--acid-dim);color:var(--acid);border-color:transparent}
.pill.bad{background:var(--bad-tint);color:var(--bad);border-color:transparent}
.pill.fire{background:var(--fire-tint);color:var(--fire);border-color:transparent}
.pill.gold{background:var(--gold-tint);color:var(--gold);border-color:transparent}
/* hero */
.hero{position:relative;overflow:hidden;background:var(--emerald-deep);border:1px solid var(--emerald);border-radius:var(--r-xl);padding:38px 40px;min-height:240px;display:flex;flex-direction:column;justify-content:center;gap:16px}
.hero .char{position:absolute;right:0;top:0;bottom:0;width:300px;overflow:hidden;pointer-events:none}
.hero .char img{width:100%;height:100%;object-fit:cover;object-position:top;transform:scaleX(-1)}
.hero h1{font-family:var(--font-display);font-weight:900;font-size:var(--fs-hero);line-height:1.12;margin:0;max-width:520px;position:relative}
.hero h1 i{color:var(--acid);font-style:normal}
.hero p{margin:0;max-width:440px;color:var(--text-2);position:relative}
.hero .mono{color:var(--emerald);position:relative}
@media(max-width:720px){.hero .char{opacity:.35}.hero h1{font-size:32px}}
/* grid */
.grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:16px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
/* streak widget */
.fireicon{width:46px;height:46px;border-radius:14px;background:var(--fire-tint);display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-fire)}
.fireicon i{font-size:24px;color:var(--fire)}
.fireicon.cold{box-shadow:none;background:var(--surface-2)}
.fireicon.cold i{color:var(--text-3)}
.counter{font-family:var(--font-mono);font-weight:700;font-size:26px;line-height:1}
.counter small{font-size:13px;color:var(--text-2);font-weight:600}
.week{display:flex;gap:8px}
.week .d{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.week .c{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:2px solid transparent}
.week .c.done{background:var(--acid)}
.week .c.done i{font-size:13px;color:var(--text-on-acid)}
.week .c.active{border-color:var(--acid)}
.week .l{font-family:var(--font-mono);font-size:10.5px;color:var(--text-2)}
.week .l.off{color:var(--text-3)}
/* progress bar */
.pbar{height:10px;border-radius:var(--r-pill);background:var(--surface-2);border:1px solid var(--hairline);overflow:visible;position:relative}
.pbar>div{height:100%;border-radius:var(--r-pill);background:var(--acid);box-shadow:var(--glow-acid);transition:width .4s var(--ease)}
.bignum{font-family:var(--font-mono);font-weight:700;font-size:var(--fs-counter);line-height:1}
.bignum small{font-size:18px;color:var(--text-2)}
/* quest rows */
.qrow{display:flex;align-items:center;gap:10px;font-size:var(--fs-small);font-weight:600;color:var(--text-2)}
.qrow.done{color:var(--text-1)}
.qrow i{font-size:15px;color:var(--text-3)}
.qrow.done i{color:var(--acid)}
.qrow .grow{flex:1}
/* heatmap */
.heat{display:grid;grid-template-rows:repeat(7,11px);grid-auto-flow:column;grid-auto-columns:11px;gap:3px;overflow-x:auto;padding-bottom:6px}
.heat i{border-radius:3px;background:var(--surface-2)}
.heat i.l1{background:rgba(185,255,71,.25)}.heat i.l2{background:rgba(185,255,71,.55)}.heat i.l3{background:var(--acid)}
.heat i.today{outline:1.5px solid var(--gold)}
/* lesson rows */
.rowlist{display:flex;flex-direction:column;gap:12px}
.lrow{display:flex;align-items:center;gap:18px;padding:16px 22px;background:var(--surface-1);border:1px solid var(--hairline);border-radius:var(--r-l);cursor:pointer;transition:all .14s var(--ease)}
.lrow:hover{background:var(--surface-2);border-color:var(--hairline-strong)}
.lrow:hover .num,.lrow:hover>.arr{color:var(--acid)}
.lrow .num{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--text-3);width:44px;flex-shrink:0;transition:color .14s}
.lrow .mid{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.lrow .t{font-weight:800;font-size:16px}
.lrow .pills{display:flex;gap:6px;flex-wrap:wrap}
.lrow .arr{font-size:20px;color:var(--text-3);transition:color .14s}
.lrow.locked{opacity:.45;cursor:default}
.lrow.locked:hover{background:var(--surface-1);border-color:var(--hairline)}
.lrow.locked:hover .num,.lrow.locked:hover>.arr{color:var(--text-3)}
/* roadmap blocks */
.blocklist{display:flex;flex-direction:column;gap:16px}
.blockcard{background:var(--surface-1);border:1px solid var(--hairline);border-radius:var(--r-l);box-shadow:var(--shadow-card);padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.blockcard.current{border-color:var(--acid);box-shadow:var(--shadow-card),var(--glow-acid)}
.blockcard.locked{opacity:.72}
.bhead{display:flex;align-items:center;gap:16px}
.bnum{font-family:var(--font-display);font-weight:800;font-size:26px;color:var(--acid);min-width:44px}
.btitle{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:-.01em}
.bsteps{display:flex;flex-direction:column;gap:2px;border-left:2px solid var(--hairline);padding-left:14px;margin-left:6px}
.mstep{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--r-s);font-size:14.5px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .14s var(--ease)}
.mstep i{font-size:16px;color:var(--text-3)}
.mstep:hover{background:var(--surface-2);color:var(--text-1)}
.mstep.done{color:var(--text-1)}
.mstep.done i{color:var(--acid)}
.mstep.locked{cursor:default}
.mstep.locked:hover{background:transparent;color:var(--text-2)}
.bproject{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;background:var(--acid-dim);border-radius:var(--r-s);font-size:14px}
.bproject i{color:var(--acid);font-size:17px;margin-top:1px}
.breslabel{margin-top:2px}
.bres{display:flex;gap:8px;flex-wrap:wrap}
.reschip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:var(--r-pill);background:var(--surface-2);border:1px solid var(--hairline);color:var(--text-1);font-size:13px;font-weight:700;text-decoration:none;transition:all .14s var(--ease)}
.reschip:hover{background:var(--surface-3);border-color:var(--hairline-strong);color:var(--acid)}
.reschip i{font-size:15px;color:var(--text-2)}
.reschip:hover i{color:var(--acid)}
/* quiz */
.q{display:flex;flex-direction:column;gap:8px;margin:6px 0}
.q .qt{font-weight:800;font-size:15px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:640px){.opts{grid-template-columns:1fr}}
.opt{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 18px;border-radius:var(--r-m);border:1px solid var(--hairline);background:var(--surface-2);color:var(--text-1);font-weight:600;font-size:15px;cursor:pointer;transition:all .14s var(--ease)}
.opt:hover{background:var(--surface-3)}
.opt input{display:none}
.opt:has(input:checked){border-color:var(--acid);background:var(--acid-dim)}
.opt .st{font-size:17px;display:none}
.q.checked .opt{cursor:default}
.q.checked .opt.correct{border-color:var(--ok);background:var(--ok-tint)}
.q.checked .opt.correct .st{display:inline;color:var(--ok)}
.q.checked .opt.wrongpick{border-color:var(--bad);background:var(--bad-tint)}
.q.checked .opt.wrongpick .st{display:inline;color:var(--bad)}
.tf{padding:11px 16px;border-radius:var(--r-s);background:var(--surface-2);border:1px solid var(--hairline-strong);color:var(--text-1);font-family:var(--font-mono);font-weight:600;font-size:15px;outline:none;transition:border-color .14s var(--ease);width:240px;max-width:100%}
.tf:focus{border-color:var(--acid)}
.q.checked .tf.okv{border-color:var(--ok)}
.q.checked .tf.badv{border-color:var(--bad)}
.explain{display:none;font-size:var(--fs-small);color:var(--text-2);align-items:flex-start;gap:7px}
.explain i{font-size:14px;color:var(--gold);margin-top:3px}
.q.checked .explain{display:flex}
.verdict{font-weight:800;margin-top:4px}
.verdict.ok{color:var(--ok)}.verdict.no{color:var(--bad)}
/* theory */
.theory p{margin:8px 0}
.theory b{color:var(--acid)}
code{background:var(--surface-2);border:1px solid var(--hairline);padding:1px 7px;border-radius:6px;font-size:.9em;font-family:var(--font-mono);color:var(--code-ink)}
pre.demo{margin:10px 0;background:var(--code-bg);color:var(--code-ink);border:1px solid var(--hairline);border-radius:var(--r-m);padding:14px 18px;font-family:var(--font-mono);font-size:13.5px;line-height:1.55;overflow:auto}
table.simple{border-collapse:collapse;width:100%;font-size:14px;margin:8px 0}
table.simple td,table.simple th{border:1px solid var(--hairline);padding:8px 12px;text-align:left}
table.simple th{background:var(--surface-2);font-family:var(--font-mono);font-size:var(--fs-micro);letter-spacing:var(--ls-micro);text-transform:uppercase;color:var(--text-2)}
.fix{border-left:3px solid var(--acid);padding:10px 16px;background:var(--acid-dim);border-radius:0 var(--r-s) var(--r-s) 0;margin:12px 0;font-size:14.5px;display:block}
.fix .was{color:var(--bad);text-decoration:line-through}
.fix .now{color:var(--acid);font-weight:700}
.fix .muted2{color:var(--text-2);font-size:var(--fs-small)}
.backlink{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--acid);font-family:var(--font-body);font-weight:800;font-size:14px;cursor:pointer;padding:0;width:fit-content}
.muted{color:var(--text-2);font-size:var(--fs-small)}
/* editor */
textarea.editor{width:100%;min-height:220px;background:var(--code-bg);color:var(--code-ink);border:1px solid var(--hairline);border-radius:var(--r-m);padding:16px;font-family:var(--font-mono);font-size:14px;line-height:1.55;resize:vertical;outline:none}
textarea.editor:focus{border-color:var(--acid)}
iframe.preview{width:100%;height:230px;border:1px solid var(--hairline);border-radius:var(--r-m);background:#fff;margin-top:6px}
/* flashcard */
.flash{width:420px;max-width:100%;height:230px;perspective:1000px;cursor:pointer;margin:8px auto}
.flash-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s var(--ease)}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;border-radius:var(--r-xl);padding:24px;text-align:center}
.face.front{background:var(--emerald-deep);border:1px solid var(--emerald)}
.face.front .en{font-family:var(--font-mono);font-size:var(--fs-micro);letter-spacing:var(--ls-micro);text-transform:uppercase;color:var(--emerald)}
.face.front .w{font-family:var(--font-display);font-weight:800;font-size:30px}
.face.back{background:var(--surface-1);border:1px solid var(--acid);transform:rotateY(180deg);box-shadow:var(--shadow-card)}
.face.back .ru{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--acid)}
.face.back .ex{font-size:var(--fs-small);color:var(--text-2)}
.center{text-align:center}
.centercol{display:flex;flex-direction:column;align-items:center;gap:14px}
/* toast + fx */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;background:var(--surface-1);border:1px solid var(--acid);color:var(--text-1);font-weight:700;font-size:14.5px;padding:12px 22px;border-radius:var(--r-pill);box-shadow:var(--shadow-card),var(--glow-acid);opacity:0;transition:.35s var(--ease);z-index:99;pointer-events:none}
.toast.show{opacity:1;bottom:40px}
canvas#fx{position:fixed;inset:0;pointer-events:none;z-index:98}
/* welcome overlay */
.overlay{position:fixed;inset:0;background:rgba(7,8,8,.85);backdrop-filter:blur(10px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.wcard{background:var(--surface-1);border:1px solid var(--hairline-strong);border-radius:var(--r-xl);padding:32px;max-width:470px;width:100%;display:flex;flex-direction:column;gap:13px;box-shadow:var(--shadow-card)}
/* nft collection */
.nftgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.nft{border-radius:var(--r-m);overflow:hidden;background:var(--surface-1);border:1px solid var(--hairline);display:flex;flex-direction:column;transition:transform .15s var(--ease)}
.nft:hover{transform:translateY(-3px)}
.nft img{width:100%;aspect-ratio:1/1.05;object-fit:cover;display:block}
.nft.locked img{filter:grayscale(1) brightness(.5)}
.nft .meta{padding:11px 13px;display:flex;flex-direction:column;gap:7px}
.nft .nm{font-weight:800;font-size:14.5px}
.nft .rar{font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase}
/* sentence builder */
.chip{padding:8px 14px;border-radius:var(--r-pill);border:1px solid var(--hairline-strong);background:var(--surface-2);color:var(--text-1);font-family:var(--font-mono);font-weight:600;font-size:13.5px;cursor:pointer;transition:all .12s var(--ease)}
.chip:hover{background:var(--surface-3);border-color:var(--acid)}
.sbrow{display:flex;flex-wrap:wrap;gap:8px;min-height:46px;padding:10px;border:1px dashed var(--hairline-strong);border-radius:var(--r-m);align-items:center}
.iconbtn{cursor:pointer}
.iconbtn:hover{color:var(--acid);border-color:var(--acid)}
.section-head{display:flex;flex-direction:column;gap:6px;padding:4px 6px 10px}
.stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
    <span class="brand">EMIL<i>.</i></span>
    <span class="mono">Тренажёр · Офлайн</span>
  </div>
  <div class="xpbox">
    <span class="pill gold" id="coinTxt" title="Монеты за мастерство — тратятся в «Коллекции»"><i class="ph-bold ph-coins"></i>0</span>
    <span class="pill acid" id="lvlTxt">LVL 1</span>
    <div class="xpbar"><div id="xpFill" style="width:0%"></div></div>
    <span class="mono" id="xpTxt" style="color:var(--text-2)">0 XP</span>
    <span class="pill iconbtn" title="Скачать прогресс (резервная копия)" onclick="exportProgress()"><i class="ph-bold ph-download-simple"></i></span>
    <label class="pill iconbtn" title="Загрузить прогресс"><i class="ph-bold ph-upload-simple"></i><input type="file" accept=".json,application/json" style="display:none" onchange="importProgress(this)"></label>
  </div>
</header>
<nav class="navtabs" id="nav"></nav>
<main id="main" class="stack"></main>
</div>
<div class="toast" id="toast"></div>
<canvas id="fx"></canvas>

<script>
"use strict";
/* ============ STATE ============ */
const KEY="emil_hub_v1";
let S={xp:0,freezes:2,streak:0,lastActive:null,days:{},prog:{},eng:{},srs:{},errors:[],introduced:0,lastIntro:null,coins:0,owned:[],boost:null,anchor:null,notes:{},lastWelcome:null};
try{const r=localStorage.getItem(KEY);if(r)S=Object.assign(S,JSON.parse(r));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
const todayStr=()=>new Date().toISOString().slice(0,10);
function day(d){return S.days[d]||(S.days[d]={xp:0,code:0,eng:0,words:0});}

let toastLater=null;
(function(){const t=todayStr();
 if(S.lastActive&&S.lastActive!==t){
   const gap=Math.round((new Date(t)-new Date(S.lastActive))/864e5)-1;
   if(gap>0){
     const y=new Date(t);y.setDate(y.getDate()-1);const yStr=y.toISOString().slice(0,10);
     if(S.freezes>=gap){S.freezes-=gap;S.lastActive=yStr;toastLater=`Заморозка спасла твой стрик (${S.streak} дн.). Осталось: ${S.freezes}`;}
     else{if(S.streak>2)toastLater=`Стрик ${S.streak} дн. сгорел. Начнём новый — сегодня день 1`;S.streak=0;S.lastActive=yStr;}
     save();}}
})();

/* ============ XP / LEVEL ============ */
const LVL=x=>Math.floor(Math.sqrt(x/60))+1;
const lvlFloor=l=>60*(l-1)*(l-1), lvlNext=l=>60*l*l;
function addXP(n,label){
 if(S.boost===todayStr())n*=2;
 const t=todayStr(),d=day(t);const wasActive=d.xp>=30;
 S.xp+=n;d.xp+=n;
 if(!wasActive&&d.xp>=30){
   if(S.lastActive!==t){S.streak+=1;S.lastActive=t;
     if(S.streak>0&&S.streak%7===0&&S.freezes<3){S.freezes++;toast(`${S.streak} дней подряд. +1 заморозка`);}
     else toast(`День засчитан. Стрик: ${S.streak}`);
     if(S.streak%10===0)confetti(2);}
 }
 const before=LVL(S.xp-n);
 if(LVL(S.xp)>before){toast(`Новый уровень: ${LVL(S.xp)}`);confetti(2);}
 else if(label)toast(`+${n} XP · ${label}`);
 save();drawHeader();
}
function drawHeader(){const l=LVL(S.xp),f=lvlFloor(l),n=lvlNext(l);
 document.getElementById("lvlTxt").textContent="LVL "+l;
 document.getElementById("xpFill").style.width=Math.round((S.xp-f)/(n-f)*100)+"%";
 document.getElementById("xpTxt").textContent=S.xp+" XP";
 const c=document.getElementById("coinTxt");if(c)c.innerHTML=`<i class="ph-bold ph-coins"></i>${S.coins||0}`;}

/* ============ TOAST + CONFETTI ============ */
let toastTimer=null;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
 clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2600);}
const fx=document.getElementById("fx"),ctx=fx.getContext("2d");let parts=[],fxRun=false;
function confetti(power=1){
 fx.width=innerWidth;fx.height=innerHeight;
 const colors=["#B9FF47","#D4FF7A","#37936F","#FFD34D","#FF7A2F"];
 for(let i=0;i<90*power;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*200,y:innerHeight*0.35,
  vx:(Math.random()-.5)*11,vy:-Math.random()*10-3,g:.28,s:4+Math.random()*5,r:Math.random()*Math.PI,
  vr:(Math.random()-.5)*.3,c:colors[i%colors.length],life:110+Math.random()*40});
 if(!fxRun){fxRun=true;requestAnimationFrame(fxTick);}}
function fxTick(){ctx.clearRect(0,0,fx.width,fx.height);parts=parts.filter(p=>p.life>0);
 parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.r+=p.vr;p.life--;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.globalAlpha=Math.min(1,p.life/40);
  ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore();});
 if(parts.length)requestAnimationFrame(fxTick);else{fxRun=false;ctx.clearRect(0,0,fx.width,fx.height);}}

{id:"m8",title:"DOM: JavaScript управляет страницей",
theory:`
<p><b>DOM</b> — страница глазами JavaScript: каждый тег — объект, который можно найти и изменить. Именно так работает весь этот тренажёр.</p>
<p><b>Найти элемент:</b></p>
<pre class="demo">const title = document.querySelector("h1");      // по тегу
const btn = document.querySelector("#myBtn");     // по id (#)
const card = document.querySelector(".card");     // по классу (.)</pre>
<p><b>Изменить:</b></p>
<pre class="demo">title.textContent = "Новый текст";
title.style.color = "lime";</pre>
<p><b>Реагировать на события:</b></p>
<pre class="demo">btn.addEventListener("click", () => {
  title.textContent = "Кнопка нажата!";
});</pre>
<p><b>Формы:</b> текст из поля ввода — <code>input.value</code>.</p>
<p>Схема любого интерактива: <b>найти → повесить обработчик → изменить</b>. Выучишь её — сможешь делать живые страницы.</p>`,

{id:"m9",title:"fetch и async/await: данные из интернета",
theory:`
<p>Приложения живут данными: погода, курсы, фильмы. Их отдаёт <b>API</b> — сервер, который отвечает данными в формате <b>JSON</b> (текст, похожий на объект JS).</p>
<p><b>fetch</b> делает запрос и возвращает <b>промис</b> — «обещание результата в будущем» (ответ приходит не мгновенно):</p>
<pre class="demo">async function getUser() {
  const res = await fetch("https://api.github.com/users/octocat");
  const data = await res.json();   // JSON → объект JS
  console.log(data.name);
}
getUser();</pre>
<p>Правила: <code>await</code> — «дождись результата», работает только внутри функции со словом <code>async</code>. <code>res.json()</code> превращает ответ в объект.</p>
<p><b>Ошибки</b> (нет интернета, сервер упал) ловят через try/catch:</p>
<pre class="demo">try {
  const res = await fetch(url);
} catch (err) {
  console.log("Ошибка: " + err);
}</pre>
<p>Тренажёр офлайн, поэтому в практике имитируем «медленный сервер» через промис с задержкой — механика та же.</p>`,
quiz:[
 {q:"Что возвращает fetch()?",o:["Сразу данные","Промис — обещание результата","Строку HTML","Ошибку"],a:1,e:"Ответ приходит не мгновенно, поэтому fetch возвращает промис."},
 {q:"Где можно использовать await?",o:["Где угодно","Только внутри async-функции","Только в циклах","Только в HTML"],a:1,e:"await работает внутри функций, помеченных async."},
 {q:"Что делает res.json()?",o:["Печатает ответ","Превращает ответ сервера в объект JS","Отправляет данные","Проверяет ошибки"],a:1,e:"JSON-текст → обычный объект, с которым можно работать."},
 {q:"JSON — это…",o:["Язык программирования","Текстовый формат данных «ключ: значение»","База данных","Фреймворк"],a:1,e:"Формат обмена данными, выглядит как объект JS."},
 {q:"Зачем нужен try/catch при запросах?",o:["Ускорить запрос","Поймать ошибку, если запрос не удался","Красиво оформить код","Обязателен всегда"],a:1,e:"Сеть ненадёжна: try/catch не даёт программе упасть."}],
practice:{type:"js",task:"Имитация API: есть функция <code>fakeApi()</code>, она возвращает промис с данными через секунду. Напиши <code>async</code>-функцию, которая ждёт результат через <code>await</code> и выводит имя и уровень.",
starter:"function fakeApi() {\n  return new Promise(resolve => {\n    setTimeout(() => resolve({ name: \"Emil\", level: \"junior soon\" }), 1000);\n  });\n}\n\n// напиши async-функцию: await fakeApi(), выведи data.name и data.level\n\n",
check:c=>/async/.test(c)&&/await/.test(c)&&/console\.log/.test(c),hint:"Нужны async function, await fakeApi() и console.log с результатом."}}
];

{id:"l1",title:"Present Simple vs Present Continuous",
theory:`
<span class="fix"><span class="was">I'm learn English</span> → <span class="now">I'm learning English</span><br><span class="muted2">Твоя ошибка из теста</span></span>
<table class="simple"><tr><th></th><th>Present Simple</th><th>Present Continuous</th></tr>

<tr><td>Форма</td><td>V / V+s (he, she, it)</td><td>am / is / are + V-ing</td></tr>
<tr><td>Пример</td><td>I learn English every day</td><td>I am learning English now</td></tr></table>
<p><b>Правило -s:</b> he/she/it: <i>She go<b>es</b>. He play<b>s</b>.</i></p>
<p><b>Нельзя:</b> «I'm learn» — либо <i>I'm learning</i>, либо <i>I learn</i>.</p>
<p>Маркеры Simple: every day, usually, often. Маркеры Continuous: now, at the moment.</p>`,

 {t:"fill",q:"He ___ (play) hockey every weekend.",a:["plays"],e:"he → plays."},

{id:"l2",title:"Past Simple: говорим о прошлом",

<p><b>Past Simple</b> — законченное действие в прошлом: yesterday, last week, ago.</p>
<p>Правильные глаголы: + <b>-ed</b>: play → play<b>ed</b>. Неправильные — запоминаем:</p>

<tr><td>go</td><td>went</td><td>идти</td></tr><tr><td>see</td><td>saw</td><td>видеть</td></tr>
<tr><td>have</td><td>had</td><td>иметь</td></tr><tr><td>make</td><td>made</td><td>делать</td></tr>
<tr><td>begin</td><td>began</td><td>начинать</td></tr><tr><td>write</td><td>wrote</td><td>писать</td></tr></table>
<p><b>Отрицание и вопрос</b> — через did, глагол в начальной форме:</p>

Did you finish the task? (НЕ "Did you finished")</pre>

const INTERVALS=[1,3,7,16,35];
function srsIntroduce(){
 const t=todayStr();
 if(S.lastIntro!==t){S.lastIntro=t;S.introducedToday=0;}
 let added=0;
 for(const [w] of VOCAB){
  if(S.srs[w])continue;
  if((S.introducedToday||0)>=10)break;
  S.srs[w]={due:t,step:-1,reps:0};S.introducedToday=(S.introducedToday||0)+1;added++;}
 if(added)save();}
function srsDue(){const t=todayStr();return VOCAB.filter(v=>S.srs[v[0]]&&S.srs[v[0]].due<=t);}
function srsAnswer(word,ok){
 const c=S.srs[word],t=new Date();
 if(ok){c.step=Math.min(c.step+1,INTERVALS.length-1);c.reps++;}
 else c.step=Math.max(-1,c.step-2);
 const days=c.step<0?0.5:INTERVALS[c.step];
 t.setDate(t.getDate()+Math.round(days));c.due=t.toISOString().slice(0,10);
 if(ok&&c.step>=INTERVALS.length-1)c.learned=true;
 if(!ok)c.learned=false;
 save();}

function quizHTML(qs,prefix){
 return qs.map((q,i)=>{
  if(q.t==="fill")return `<div class="q" id="${prefix}${i}"><div class="qt">${i+1}. ${q.q}</div><input type="text" class="tf" id="${prefix}${i}in" ${q.w?`style="width:${q.w}px"`:""} placeholder="впиши ответ"><div class="explain"><i class="ph-bold ph-lightbulb"></i><span>${q.e}</span></div></div>`;
  const ord=q.o.map((_,j)=>j);for(let k=ord.length-1;k>0;k--){const m=Math.floor(Math.random()*(k+1));[ord[k],ord[m]]=[ord[m],ord[k]];}
  return `<div class="q" id="${prefix}${i}"><div class="qt">${i+1}. ${q.q}</div><div class="opts">${ord.map(j=>`<label class="opt" data-j="${j}"><input type="radio" name="${prefix}${i}" value="${j}"><span>${esc(q.o[j])}</span><i class="ph-bold ph-check-fat st"></i></label>`).join("")}</div><div class="explain"><i class="ph-bold ph-lightbulb"></i><span>${q.e}</span></div></div>`;}).join("");}
function esc(s){return String(s).replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function checkQuiz(qs,prefix,errKind,errId){
 let score=0;
 qs.forEach((q,i)=>{const el=document.getElementById(prefix+i);el.classList.add("checked");let ok=false;
  if(q.t==="fill"){const inp=document.getElementById(prefix+i+"in");
   const v=(inp.value||"").trim().toLowerCase().replace(/\s+/g," ");
   ok=q.a.some(a=>v===a.toLowerCase()||v.includes(a.toLowerCase()));
   inp.classList.add(ok?"okv":"badv");}
  else{const sel=el.querySelector("input:checked");const pick=sel?+sel.value:-1;ok=pick===q.a;
   el.querySelectorAll(".opt").forEach(lab=>{const j=+lab.dataset.j;
    if(j===q.a)lab.classList.add("correct");
    else if(j===pick){lab.classList.add("wrongpick");lab.querySelector(".st").className="ph-bold ph-x st";}
    lab.querySelector("input").disabled=true;});}
  if(ok){score++;addXP(2);}
  else if(errKind){S.errors=S.errors||[];if(!S.errors.some(e=>e.k===errKind&&e.id===errId&&e.i===i))S.errors.push({k:errKind,id:errId,i:i});}});
 save();return score;}

 document.getElementById("noteRes_"+k).textContent="Сохранено";
 if(first)addXP(5,"объяснил своими словами");}

/* ============ MIX OF THE DAY + SENTENCE BUILDER ============ */
function sbInit(sent){
 const words=sent.replace(/[.!?]/g,"").split(" ").filter(Boolean);
 window._sb={target:words,bank:words.map((w,i)=>({w,i})),ans:[]};
 for(let k=window._sb.bank.length-1;k>0;k--){const m=Math.floor(Math.random()*(k+1));[window._sb.bank[k],window._sb.bank[m]]=[window._sb.bank[m],window._sb.bank[k]];}}
function sbRender(){const s=window._sb;
 document.getElementById("sbAns").innerHTML=s.ans.length?s.ans.map((o,k)=>`<button class="chip" style="border-color:var(--acid)" onclick="sbBack(${k})">${esc(o.w)}</button>`).join(""):'<span class="muted">Нажимай на слова внизу — собирай предложение сюда</span>';
 document.getElementById("sbBank").innerHTML=s.bank.length?s.bank.map((o,k)=>`<button class="chip" onclick="sbPick(${k})">${esc(o.w)}</button>`).join(""):'<span class="muted">Все слова использованы</span>';}
function sbPick(k){const s=window._sb;s.ans.push(s.bank.splice(k,1)[0]);sbRender();}
function sbBack(k){const s=window._sb;s.bank.push(s.ans.splice(k,1)[0]);sbRender();}
function startMix(){
 const pool=[];
 PROG.forEach(m=>{if((S.prog[m.id]||{}).quiz!=null)m.quiz.forEach(q=>pool.push(q));});
 ENG.forEach(l=>{if((S.eng[l.id]||{}).best!=null)l.ex.forEach(q=>pool.push(q));});
 if(pool.length<5){toast("Микс откроется после первого урока кода и английского");return;}
 const qs=(S.errors||[]).slice(0,2).map(e=>(e.k==="prog"?PROG.find(x=>x.id===e.id).quiz:ENG.find(x=>x.id===e.id).ex)[e.i]);
 let guard=0;
 while(qs.length<5&&guard++<300){const q=pool[Math.floor(Math.random()*pool.length)];if(!qs.includes(q))qs.push(q);}
 for(let k=qs.length-1;k>0;k--){const m=Math.floor(Math.random()*(k+1));[qs[k],qs[m]]=[qs[m],qs[k]];}
 window._mix=qs;
 const v=VOCAB[Math.floor(Math.random()*VOCAB.length)];sbInit(v[2]);window._sbWord=v;
 main.innerHTML=`<button class="backlink" onclick="view={tab:'dash'};draw()"><i class="ph-bold ph-arrow-left"></i>Дашборд</button>
 <div class="section-head" style="padding-top:0"><span class="mono">Interleaving · вперемешку запоминается прочнее</span>
 <h1 class="disp">Микс дня</h1>
 <span class="muted">Код и английский вперемешку + собери предложение. Первыми идут вопросы, где ты ошибался.</span></div>
 <div class="widget">${quizHTML(qs,"mx")}
  <div class="q"><div class="qt">${qs.length+1}. Собери предложение со словом «${esc(v[0])}» (${esc(v[1])})</div>
  <div class="sbrow" id="sbAns"></div><div class="sbrow" id="sbBank" style="border-style:solid"></div>
  <div class="verdict" id="sbV"></div></div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap"><button class="btn" id="mxBtn" onclick="finishMix()">Проверить</button><div id="mxRes" class="verdict"></div></div></div>`;
 sbRender();window.scrollTo(0,0);}
function finishMix(){
 const b=document.getElementById("mxBtn");if(b.disabled)return;b.disabled=true;
 const qs=window._mix,s0=checkQuiz(qs,"mx");
 const sb=window._sb,okSb=sb.ans.map(o=>o.w).join(" ")===sb.target.join(" ");
 const v=document.getElementById("sbV");v.className="verdict "+(okSb?"ok":"no");
 v.textContent=okSb?"Собрано верно":"Правильно: "+window._sb.target.join(" ");
 if(okSb)addXP(4);
 const s=s0+(okSb?1:0),total=qs.length+1,need=Math.ceil(total*0.8);
 const d=day(todayStr()),r=document.getElementById("mxRes");
 r.className="verdict "+(s>=need?"ok":"no");
 r.textContent=`${s}/${total}`+(s>=need?" · Засчитано":" · Нужно "+need);
 if(s>=need&&!d.mix){d.mix=1;addXP(15,"микс дня");
  if(s===total){addCoins(12,"идеальный микс");tryDrop();}else addCoins(6,"микс дня");
  confetti(1);}
 save();}

/* ============ INIT v2 ============ */
srsIntroduce();
draw();
if(toastLater){toast(toastLater);toastLater=null;}
</script>
